<!DOCTYPE html>
<html>
  <head>
    <title>dice</title>
    <script>
      function getRandomInt(max) {
        return Math.floor(Math.random() * max);
      }
      
    </script>
    
  </head>
  <body>
    <button onclick="getRandomInt(6)">dice</button>
    <p>The rolled number is <span id="number"></span></p>
    <P>version 2/P>
  </body>
</html>
