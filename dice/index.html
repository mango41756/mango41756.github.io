<!DOCTYPE html>
<html>
  <head>
    <title>dice</title>
    <script>
      function getRandomInt(max) {
        let dice = Math.floor(Math.random() * max);
        document.getElementById("number").textContent = dice;
      }
      
    </script>
    
  </head>
  <body>
    <button onclick="getRandomInt(6)">dice</button>
    <p>The rolled number is <span id="number"></span></p>
    <P>version 4</P>
  </body>
</html>
