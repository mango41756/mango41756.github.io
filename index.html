<!DOCTYPE html>
<html lang="en">
    <head>
        <title> click counter </title>
        <script>
            var x
            x = 0
            function textchange() {
                document.getElementById('text').innerHTML = x+=1;
            }
        </script>
    </head>
    <body>
        <h1> click </h1>
        <button type="button" onclick="textchange()"> button </button>
        <p>Clicks: <span id="text">0</span></p>
    </body>
</html>
