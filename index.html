<!DOCTYPE html>
<html lang="en">
    <head>
        <style>

            body{
                background-color: #1e2729;
                color: white;
                font-family: Arial;   
            }

            button{
                padding: 5px;
                margin: 0.1px;
            }

            .upgrades{
                margin-top: 10px;
            }

        </style>

        <title> click counter </title>
        <script>
            const game = {
                clicks: 0,
                clickpower: 1,
                clickmult: 1,
                playtime: 0,
                multupgbought: false,
                autoclickerbought: false
            }

            const upgs = {
                ClickPowerUPG: { cost: 100, currency: "clicks", max: 100, scaling: 1.05, id: "ClickPCounter", variable: "clickpower", amount: 0, reward: 1, buttonid: "ClickPButton"},
                ClickMultUPG: { cost: 1000, currency: "clicks", max: 1, id: "ClickMultCounter", variable: "clickmult", amount: 0, reward: 1, onetimepurchase: true, boolean: "multupgbought"},
                AutoClickUPG: { cost: 500, currency: "clicks", max: 1, id: "AutoClickerCounter", amount: 0, onetimepurchase: true, boolean: "autoclickerbought"},
            }


            function elementid(id) {
                return document.getElementById(id);

            }

            function clickcounterupdate() {
                elementid("text").textContent = formatNumber(game.clicks);
            }
            
            function clickcounterclick() {
                game.clicks+=game.clickpower*game.clickmult;
                clickcounterupdate();
            }
            function buyupg(upgrade) {
                let upg = upgs[upgrade];
                if (upg.amount >= upg.max) return;
                if (game[upg.currency] >= upg.cost) {
                    game[upg.currency] -= upg.cost;
                    if (upg.scaling) {
                        upg.cost *= upg.scaling;
                    }
                    if (upg.variable) {
                        game[upg.variable] += upg.reward;
                    }
                    upg.amount += 1;
                    upg.cost = Math.round(upg.cost)
                    if (upg.buttonid) {
                        elementid(upg.buttonid).textContent = upg.cost;
                    }
                    elementid(upg.id).textContent = upg.amount;
                    clickcounterclick();
                    if (upg.onetimepurchase) {
                        game[upg.boolean] = true
                    }
                } else {
                    alert("Not enough clicks")
                }
            }

            function formatNumber(num) {
                if (num >= 1000000000) {
                    return (num / 1000000000).toFixed(1).replace(".0","") + "B";
                }
                if (num >= 1000000) {
                    return (num / 1000000).toFixed(1).replace(".0","") + "M";
                }
                if (num >= 1000) {
                    return (num / 1000).toFixed(1).replace(".0","") + "K";
                }
                return num;
            }

            function saveGame() {
                const saveData = {
                    game: game,
                    upgAmounts: {},
                    upgCosts: {}
                };
                for (let key in upgs) {
                    saveData.upgAmounts[key] = upgs[key].amount;
                    saveData.upgCosts[key] = upgs[key].cost;
                }
                localStorage.setItem("clickerSave", JSON.stringify(saveData));
            }

            function loadGame() {
                let save = localStorage.getItem("clickerSave");
                if (save) {
                    const saveData = JSON.parse(save);
                    Object.assign(game, saveData.game);

                    for (let key in saveData.upgAmounts) {
                        if (upgs[key]) {
                            upgs[key].amount = saveData.upgAmounts[key];
                            upgs[key].cost = saveData.upgCosts[key];
                        }
                    }
                }
            }

            function refreshUpgradeUI() {
                for (let key in upgs) {
                    let upg = upgs[key];
                    elementid(upg.id).textContent = upg.amount;
                    if (upg.buttonid) {
                        elementid(upg.buttonid).textContent
                    }
                }
            }

            setInterval(saveGame, 5000);

            setInterval(function() {
                  game.playtime+=1;
                  elementid("PlaytimeCounter").textContent = game.playtime;

                  if (game.autoclickerbought) {
                    clickcounterclick();
                    clickcounterupdate();
                  }

                }, 1000);

            window.onload = function() {
                loadGame();
                clickcounterupdate();
                refreshUpgradeUI();
            };

        </script>
    </head>
    <body>
        <h1> Clicker </h1>
        <hr>
        <br>
        <button onclick="clickcounterclick()"> Click </button>

        <p>Clicks: <span id="text">0</span></p>

        <div class="upgrades">
            <hr>
            <h2>Upgrades</h2>

            <p>Click Power: <span id="ClickPCounter">0</span>/100</p>
            <button id="ClickP" onclick="buyupg('ClickPowerUPG')"> Buy 1 Click Power for <span id="ClickPButton">100</span> clicks</button>
        </div>
        <br>
        <hr>

        <h2>One time upgrades</h2>

        <p>Click Multiplier: <span id="ClickMultCounter">0</span>/1</p>
            <button id="ClickMult" onclick="buyupg('ClickMultUPG')"> Buy 1 Click Multiplier for 1000 clicks</button>

        <p>You have <span id="AutoClickerCounter">0</span>/1 Autoclickers</p>
        <button id="AutoClick" onclick="buyupg('AutoClickUPG')"> Buy an autoclicker for 500 clicks </button>
        <br>
        <br>
        <hr>
        <br>
        <p>Version 1.3</p>
        <p>https://discord.gg/rD3AYJAxpW</p>
        <p>Playtime: <span id="PlaytimeCounter">0</span></p>
    </body>
</html>
