<!DOCTYPE html>
<html lang="en">
    <head>
        <title> click counter </title>
        <script>
            const game = {
                clicks: 0,
                clickpower: 0,
                clickmult: 0,
                playtime: 0,
                multupgbought: false,
                autoclickerbought: false
            }

            const upgs = {
                ClickPowerUPG: { cost: 100, currency: "clicks", max: 100, scaling: 1.05, id: "ClickPCounter", variable: "clickpower", amount: 0, reward: game.clickpower+=1, buttonid: "ClickPButton"},
                ClickMultUPG: { cost: 1000, currency: "clicks", max: 1, id: "ClickMultCounter", variable: "clickmult", amount: 0, reward: game.clickmult+=1, onetimepurchase: true, boolean: "multupgbought"},
                AutoClickUPG: { cost: 500, currency: "clicks", max: 1, id: "AutoClickerCounter", amount: 0, onetimepurchase: true, boolean: "autoclickerbought"},
            }


            function elementid(id) {
                return document.getElementById(id);

            }

            function clickcounterupdate() {
                elementid("text").textContent = formatNumber(game.clicks);
            }
            
            function clickcounterclick() {
                game.clicks+=game.clickpower*game.clickmult;
                clickcounterupdate();
            }
            function buyupg(upgrade) {
                let upg = upgs[upgrade];
                if (upg.amount >= upg.max) return;
                if (game[upg.currency] >= upg.cost) {
                    game[upg.currency] -= upg.cost;
                    if (upg.scaling) {
                        upg.cost *= upg.scaling;
                    }
                    if (upg.variable) {
                        game[upg.variable] += upg.reward;
                    }
                    upg.amount += 1;
                    upg.cost = Math.round(upg.cost)
                    if (upg.buttonid) {
                        elementid(upg.buttonid).textContent = upg.cost;
                    }
                    elementid(upg.id).textContent = upg.amount;
                    clickcounterclick();
                    if (upg.onetimepurchase) {
                        game[upg.boolean] = true
                    }
                } else {
                    alert("Not enough clicks")
                }
            }

            function textpos(x, y, id) {
                let p = elementid(id);
                p.style.left = x + "px";
                p.style.top = y + "px";
                p.style.position = "absolute";
            }

            function formatNumber(num) {
                if (num >= 1000000000) {
                    return (num / 1000000000).toFixed(1).replace(".0","") + "B";
                }
                if (num >= 1000000) {
                    return (num / 1000000).toFixed(1).replace(".0","") + "M";
                }
                if (num >= 1000) {
                    return (num / 1000).toFixed(1).replace(".0","") + "K";
                }
                return num;
}

            setInterval(function() {
                  game.playtime+=1;
                  elementid("PlaytimeCounter").textContent = game.playtime;

                  if (game.autoclickerbought) {
                    clickcounterclick();
                    clickcounterupdate();
                  }

                }, 1000);

            window.onload = function() {
                textpos(200, 90, "ClickP");
                textpos(200, 110, "ClickPCounterPos");
                textpos(7, 300, "ClickMult");
                textpos(7, 310, "ClickMultPos");
                textpos(7, 370, "AutoClick");
                textpos(7, 380, "AutoClickPos");
                textpos(7, 550, "Version");
                textpos(125, 550, "Discord");
            };

        </script>
    </head>
    <body style="background-color: #1e2729;">
        <h1 style="color: white;"> Clicker </h1>
        <button type="button" onclick="clickcounterclick()"> button </button>
        <p style="color: white;">Clicks: <span id="text">0</span></p>
        <p id="ClickPCounterPos" style="color: white;">Click Power: <span id="ClickPCounter">0</span>/100</p>
        <button id="ClickP" onclick="buyupg('ClickPowerUPG')"> Buy 1 Click power for <span id="ClickPButton">100</span> clicks </button>
        <button id="ClickMult" onclick="buyupg('ClickMultUPG')"> Buy 1 Click Multiplier for 1000 clicks</button>
        <p id="ClickMultPos" style="color: white;">Click Multiplier: <span id="ClickMultCounter">0</span>/1</p>
        <p style="color: white;"> Current Playtime: <span id="PlaytimeCounter">0</span></p>
        <hr>
        <h1 style="color: white;">One time purchase Upgrades</h1>
        <p id="AutoClickPos" style="color: white;">You have <span id="AutoClickerCounter">0</span>/1 Autoclickers</p>
        <button id="AutoClick" onclick="buyupg('AutoClickUPG')"> Buy an autoclicker for 500 clicks</button>
        <p style="color: white" id="Version"> Version 1.2V</p>
        <p style="color: white" id="Discord">https://discord.gg/rD3AYJAxpW</p>
    </body>
</html>
