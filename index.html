<!DOCTYPE html>
<html lang="en">
    <head>
        <title> click counter </title>
        <script>
            var clicks = 10000;
            var clickpower = 1;
            var clickmult = 1;
            var playtime = 0;
            var multupgbought = false;
            var autoclickerbought = false;


            function elementid(id) {
                return document.getElementById(id);

            }

            function clickcounterupdate() {
                elementid("text").textContent = formatNumber(clicks);
            }
            
            function clickcounterclick() {
                clicks+=clickpower*clickmult;
                clickcounterupdate();
            }

            function textpos(x, y, id) {
                let p = elementid(id);
                p.style.left = x + "px";
                p.style.top = y + "px";
                p.style.position = "absolute";
            }
            
            function buy(cost, reward, type, id) {
                if (clicks >= cost) {
                    window[type] += reward;
                    clicks -= cost;
                    elementid(id).textContent = formatNumber(window[type]);
                    clickcounterupdate()
                } else {
                    alert("Not enough clicks");
                }

            }

            function buyupg(cost, reward, type, id, variable) {
                if (window[variable] == false) {
                    if (clicks >= cost) {
                        window[variable] = true;
                        window[type] = (window[type] || 0) + reward;
                        elementid(id).textContent = 1
                        clickcounterupdate()
                    } else {
                        alert("Not enough clicks")
                    }
                } else {
                    alert("You already bought this upgrade")
                }
            }

            function formatNumber(num) {
                if (num >= 1000000000) {
                    return (num / 1000000000).toFixed(1).replace(".0","") + "B";
                }
                if (num >= 1000000) {
                    return (num / 1000000).toFixed(1).replace(".0","") + "M";
                }
                if (num >= 1000) {
                    return (num / 1000).toFixed(1).replace(".0","") + "K";
                }
                return num;
}

            setInterval(function() {
                  playtime+=1;
                  document.getElementById("PlaytimeCounter").textContent = playtime;

                  if (autoclickerbought) {
                    clickcounterclick();
                    clickcounterupdate();
                  }

                }, 1000);

            window.onload = function() {
                textpos(200, 90, "ClickP");
                textpos(200, 110, "ClickPCounterPos");
                textpos(7, 300, "ClickMult");
                textpos(7, 310, "ClickMultPos");
                textpos(7, 370, "AutoClick");
                textpos(7, 380, "AutoClickPos");
            };

        </script>
    </head>
    <body style="background-color: #1e2729;">
        <h1 style="color: white;"> Clicker </h1>
        <button type="button" onclick="clickcounterclick()"> button </button>
        <p style="color: white;">Clicks: <span id="text">0</span></p>
        <p id="ClickPCounterPos" style="color: white;">Click Power: <span id="ClickPCounter">1</span></p>
        <button id="ClickP" onclick="buy(100, 1, 'clickpower', `ClickPCounter`)"> Buy 1 Click power for 100 clicks </button>
        <button id="ClickMult" onclick="buyupg(1000, 1, 'clickmult', 'ClickMultCounter', 'multupgbought')"> Buy 1 Click Multiplier for 1000 clicks</button>
        <p id="ClickMultPos" style="color: white;">Click Multiplier: <span id="ClickMultCounter">0</span>/1</p>
        <p style="color: white;"> Current Playtime: <span id="PlaytimeCounter">0</span></p>
        <hr>
        <h1 style="color: white;">One time purchase Upgrades</h1>
        <p id="AutoClickPos" style="color: white;">You have <span id="AutoClickerCounter">0</span>/1 Autoclickers</p>
        <button id="AutoClick" onclick="buyupg(500, 1, null, 'AutoClickerCounter', 'autoclickerbought')"> Buy an autoclicker </button>
    </body>
</html>
